name: PR Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: temporal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: temporal/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-syntax:
    name: Backend Syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: temporal/aliyun-fc/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: temporal/aliyun-fc/api/package-lock.json

      - name: Install backend deps
        run: npm ci

      - name: Check entry syntax
        run: node -c index.js

      - name: Check route and service syntax
        run: find src -name '*.js' -print0 | xargs -0 -n1 node -c
